name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: multica
      POSTGRES_USER: multica
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multica"]
      interval: 5s
      timeout: 3s
      retries: 10

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    image: multica-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/app/entrypoint.sh"]
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MULTICA_APP_URL: ${MULTICA_APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    volumes:
      - ./entrypoint.sh:/app/entrypoint.sh:ro

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    image: multica-web:latest
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"

volumes:
  pgdata:
